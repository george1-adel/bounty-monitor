name: Bounty Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit data back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests -q

      - name: Run bounty monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SCAN_BOT_TOKEN: ${{ secrets.SCAN_BOT_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 monitor_action.py

      - name: Commit updated data
        run: |
          git config user.email "bounty-monitor-bot@noreply.github.com"
          git config user.name "Bounty Monitor Bot"
          git add bounty_data/
          git diff --staged --quiet || git commit -m "chore: update bounty data [skip ci]"
          git push
